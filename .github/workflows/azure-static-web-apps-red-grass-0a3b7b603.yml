name: Azure Static Web Apps CI/CD

on:
  push:
    branches: [master]

concurrency:
  group: swa-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

jobs:
  build_and_deploy_job:
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false
          fetch-depth: 2

      - name: Detect version change
        id: detect
        run: |
          set -u
          PATHS=(
            packages/landing-page/package.json
            packages/ora-components/package.json
          )
          BEFORE="${{ github.event.before }}"
          if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ] \
             || ! git cat-file -e "${BEFORE}^{commit}" 2>/dev/null; then
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
            echo "Deploy: yes (no usable previous commit — fail-open)" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          for p in "${PATHS[@]}"; do
            prev=$(git show "${BEFORE}:${p}" 2>/dev/null | jq -r .version 2>/dev/null || echo "")
            curr=$(jq -r .version "$p" 2>/dev/null || echo "")
            if [ -n "$curr" ] && [ "$prev" != "$curr" ]; then
              echo "should_deploy=true" >> "$GITHUB_OUTPUT"
              echo "Deploy: yes — \`$p\` bumped \`${prev:-<absent>}\` → \`${curr}\`" >> "$GITHUB_STEP_SUMMARY"
              exit 0
            fi
          done
          echo "should_deploy=false" >> "$GITHUB_OUTPUT"
          echo "Deploy: no — no tracked package version changed since \`${BEFORE}\`" >> "$GITHUB_STEP_SUMMARY"

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build
        run: |
          npx turbo run build --filter=landing-page...
          cp packages/landing-page/staticwebapp.config.json packages/landing-page/dist/

      - name: Deploy
        if: steps.detect.outputs.should_deploy == 'true'
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_RED_GRASS_0A3B7B603 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          skip_app_build: true
          app_location: "packages/landing-page/dist"
          api_location: ""
