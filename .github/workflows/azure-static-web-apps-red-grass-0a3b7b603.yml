name: Azure Static Web Apps CI/CD

on:
  push:
    branches: [master]
    paths:
      - 'packages/landing-page/**'
      - 'packages/ora-components/src/**'
      - 'packages/ora-components/package.json'
      - '.github/workflows/azure-static-web-apps-red-grass-0a3b7b603.yml'

concurrency:
  group: swa-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

jobs:
  build_and_deploy_job:
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false
          fetch-depth: 2

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build
        run: |
          npx turbo run build --filter=landing-page...
          cp packages/landing-page/staticwebapp.config.json packages/landing-page/dist/

      - name: Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_RED_GRASS_0A3B7B603 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          skip_app_build: true
          app_location: "packages/landing-page/dist"
          api_location: "packages/landing-page/api"
