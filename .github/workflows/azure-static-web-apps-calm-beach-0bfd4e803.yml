name: Azure Static Web Apps CI/CD

on:
  push:
    branches: [master]
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: [master]

# Cancel in-flight runs on the same ref so PR pushes don't pile up.
concurrency:
  group: swa-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build & deploy MCP server + landing
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies (monorepo)
        run: npm ci --no-audit --no-fund

      - name: Build component library (manifest)
        run: npm run build --workspace=@tdq/ora-components --if-present

      - name: Build MCP server (stages api/dist + landing data)
        run: npm run build --workspace=ora-mcp-server

      - name: Sanity check api artifact
        run: |
          test -f packages/mcp-server/api/host.json
          test -f packages/mcp-server/api/package.json
          test -f packages/mcp-server/api/dist/http-function.js
          test -f packages/mcp-server/api/dist/data/component-manifest.json
          test -f packages/mcp-server/public/index.html
          echo "OK: api + landing artifacts present"

      - name: Deploy to Azure Static Web Apps
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_CALM_BEACH_0BFD4E803 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: packages/mcp-server/public
          api_location: packages/mcp-server/api
          output_location: ''
          skip_app_build: true
          skip_api_build: true

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close PR preview environment
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_CALM_BEACH_0BFD4E803 }}
          action: close
