name: Azure Static Web Apps CI/CD

on:
  push:
    branches: [master]
    paths:
      - 'packages/mcp-server/**'
      - 'packages/ora-components/src/**'
      - 'packages/ora-components/package.json'
      - 'packages/stories/src/**'
      - 'packages/stories/package.json'
      - 'packages/examples/src/**'
      - 'packages/examples/package.json'
      - '.github/workflows/azure-static-web-apps-calm-beach-0bfd4e803.yml'

# Cancel superseded master pushes so deploys don't pile up.
concurrency:
  group: swa-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

jobs:
  build_and_deploy_job:
    runs-on: ubuntu-latest
    name: Build & deploy MCP server + landing
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false
          fetch-depth: 2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies (monorepo)
        run: npm ci --no-audit --no-fund

      - name: Build component library (manifest)
        run: npm run build --workspace=@tdq/ora-components --if-present

      - name: Build MCP server (stages api/dist + landing data)
        run: npm run build --workspace=ora-mcp-server

      - name: Sanity check api artifact
        run: |
          test -f packages/mcp-server/api/host.json
          test -f packages/mcp-server/api/package.json
          test -f packages/mcp-server/api/dist/http-function.js
          test -f packages/mcp-server/api/dist/data/component-manifest.json
          test -f packages/mcp-server/public/index.html
          echo "OK: api + landing artifacts present"

      - name: Install api runtime deps (Functions host needs node_modules)
        if: steps.detect.outputs.should_deploy == 'true'
        run: npm install --omit=dev --no-audit --no-fund --no-package-lock
        working-directory: packages/mcp-server/api

      - name: Deploy to Azure Static Web Apps
        if: steps.detect.outputs.should_deploy == 'true'
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_CALM_BEACH_0BFD4E803 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: packages/mcp-server/public
          api_location: packages/mcp-server/api
          output_location: ''
          skip_app_build: true
          skip_api_build: true
